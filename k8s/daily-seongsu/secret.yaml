# Step 5: K8s Secret for daily-seongsu
# .env 파일의 민감 정보를 K8s Secret으로 관리
# 적용 전 반드시 base64 인코딩된 실제 값으로 교체할 것:
#   echo -n "VALUE" | base64
#
# 참고: 이 파일 자체는 git에 커밋하지 말 것 (값이 노출될 수 있음)
# .gitignore에 추가 권장: k8s/daily-seongsu/secret.yaml
#
# 대신 secret.yaml.template을 커밋하고, 실제 값은 서버에서만 관리한다.
apiVersion: v1
kind: Secret
metadata:
  name: daily-seongsu-secret
  namespace: default
type: Opaque
stringData:
  # stringData를 쓰면 base64 인코딩 없이 plain text로 입력 가능
  # K8s가 자동으로 인코딩해서 저장함
  SEOUL_DATA_API_KEY: "REPLACE_WITH_ACTUAL_VALUE"
  KMA_API_KEY: "REPLACE_WITH_ACTUAL_VALUE"
  SUPABASE_URL: "REPLACE_WITH_ACTUAL_VALUE"
  SUPABASE_KEY: "REPLACE_WITH_ACTUAL_VALUE"
