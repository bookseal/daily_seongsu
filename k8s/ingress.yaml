apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # cert-manager: 이 Ingress의 TLS는 bit-habit-tls Certificate 리소스가 관리
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - bit-habit.com
    - "*.bit-habit.com"
    secretName: tls-secret  # cert-manager가 자동 갱신하는 Secret
  rules:
  - host: bit-habit.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: static-web-svc
            port:
              number: 80
  - host: www.bit-habit.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: static-web-svc
            port:
              number: 80
  - host: blog.bit-habit.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: blog-svc
            port:
              number: 80
  - host: www.blog.bit-habit.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: blog-svc
            port:
              number: 80
  - host: booktoss.bit-habit.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: booktoss-svc
            port:
              number: 80
  - host: code-server.bit-habit.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: code-server-svc
            port:
              number: 80
  - host: daily-seongsu.bit-habit.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: daily-seongsu-svc
            port:
              number: 80
  - host: habit.bit-habit.com
    http:
      paths:
      - path: /api/
        pathType: Prefix
        backend:
          service:
            name: fastapi-svc
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: static-web-svc
            port:
              number: 80
  - host: startpage.bit-habit.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fastapi-svc
            port:
              number: 80
  - host: status.bit-habit.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: static-web-svc
            port:
              number: 80
  - host: viz.bit-habit.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: viz-svc
            port:
              number: 80
  - host: wiki.bit-habit.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wiki-svc
            port:
              number: 80
  - host: www.wiki.bit-habit.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wiki-svc
            port:
              number: 80
